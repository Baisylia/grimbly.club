<!DOCTYPE html>
<html>
    <!-- Imports and Settings -->
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device.width, initial-scale=1">
        <link rel="stylesheet" href="code/big_styles10.css">
        <audio id="button-sound" src="sounds/button_sound_heavy.mp3"></audio>
        <title>
            grimbly.club
        </title>
    </head>

    <body>
        <div class="background">

            <div class="page-layout">
                <!-- Left Cool Images -->
                <div id="leftCoolImages" class="coolimage-column-left">

                </div>

                <div class="main-panel">
                    <!-- Grimbly Carousel -->
                    <div class="carousel-container">
                        <iframe
                            id="carouselFrame"
                            src="grimbly-carousel.html"
                            style="width: 90vw; height:10vw; border: none;">
                        </iframe>
                    </div>

                    <!-- Title -->
                    <div class="title-container">
                        <img src="images/title.png" class="title-pic" onmousedown="soundPress()" onclick="navigate('home.html')">
                    </div>

                    <!-- Splash Text -->
                    <div class="splash-container">
                        <span id="splashText">Loading...</span>
                    </div>

                    <div class="middle-panel">
                        <!-- Frame -->
                        <div class="frame-container">
                            <img src="images/iframe_border.png" class="panel-border">
                            <iframe class="content-frame" src="start.html"></iframe>
                        </div>

                        <!-- Sidebar -->
                        <div class="sidebar-container">
                            <img src="images/scrolly.png" class="bg-image">
                            <img src="images/sidebar_border.png" class="panel-border"> 

                            <div class="sidebar">

                                <!-- Settings -->
                                <button class="button-icon" onmousedown="soundPress()" onclick="textButtonPress('settingy', false)">
                                    <img src="images/buttons/settings.png" alt="Settings">
                                    <span class="mini">Settings</span>
                                </button>

                                <div id="settingy" style="display: none;">
                                    <!-- Speed Slider -->
                                    <div class="button-icon">
                                        <input class="slidey" type="range" id="speedSlider" min="1" max="600" value="75">
                                        <span class="mini">
                                            Carousel Speed
                                        </span>
                                    </div>

                                    <!-- Music Volume -->
                                    <div class="button-icon">
                                        <input class="slidey" type="range" id="musicVolume" min="0" max="1" step="0.01" value="0.4">
                                        <span class="mini">
                                            Music Volume
                                        </span>
                                    </div>

                                    <!-- Music Toggle -->
                                    <button class="button-icon" id="musicToggle">
                                        <img src="images/buttons/music.png">
                                        <span class="mini">Pause Music</span>
                                    </button>
                                    <br><br>
                                </div>

                                <!-- Buttons -->
                                <button class="button-icon" onmousedown="soundPress()" onclick="loadPage('start.html')">
                                <img src="images/buttons/home.png" alt="Start">
                                <span class="mini">Start</span>
                                </button>

                                <button class="button-icon" onmousedown="soundPress()" onclick="loadPage('webmaster.html')">
                                <img src="images/buttons/webmasters.png" alt="Webmaster">
                                <span class="mini">Webmaster</span>
                                </button>

                                <button class="button-icon" onmousedown="soundPress()" onclick="loadPage('support.html')">
                                <img src="images/buttons/love.png" alt="Support">
                                <span class="mini">Support</span>
                                </button>
                                
                                <button class="button-icon" onmousedown="soundPress()" onclick="loadPage('projects.html')">
                                <img src="images/buttons/games.png" alt="Projects">
                                <span class="mini">My Projects</span>
                                </button>
                                
                                <button class="button-icon" onmousedown="soundPress()" onclick="loadPage('blog-main.html')">
                                <img src="images/buttons/blog.png" alt="Blog">
                                <span class="mini">Blog</span>
                                </button>
                                
                                <button class="button-icon" onmousedown="soundPress()" onclick="loadPage('media-games.html')">
                                <img src="images/buttons/videos.png" alt="Media">
                                <span class="mini">Favourite Media</span>
                                </button>
                                
                                <button class="button-icon" onmousedown="soundPress()" onclick="loadPage('collections-bfdi.html')">
                                <img src="images/buttons/collections.png" alt="Collections">
                                <span class="mini">My Collections</span>
                                </button>
                                
                                <button class="button-icon" onmousedown="soundPress()" onclick="loadPage('changelogs.html')">
                                <img src="images/buttons/changelogs.png" alt="Changelogs">
                                <span class="mini">Changelogs</span>
                                </button>
                                
                                <button class="button-icon" onmousedown="soundPress()" onclick="loadPage('info.html')">
                                <img src="images/buttons/info.png" alt="Info">
                                <span class="mini">Info</span>
                                </button>
                                
                                <button class="button-icon" onmousedown="soundPress()" onclick="loadPage('credits.html')">
                                <img src="images/buttons/credits.png" alt="Credits">
                                <span class="mini">Credits</span>
                                </button>
                                
                                <button class="button-icon" onmousedown="soundPress()" onclick="loadPage('links.html')">
                                <img src="images/buttons/links.png" alt="Links">
                                <span class="mini">My Links</span>
                                </button>
                                
                                <button class="button-icon" onmousedown="soundPress()" onclick="randomPage()">
                                <img src="images/buttons/random.png" alt="Random">
                                <span class="mini">Random Page</span>
                                </button>
                                
                                <button class="button-icon" onmousedown="soundPress()" onclick="navigate('index.html')">
                                <img src="images/buttons/quit.png" alt="Quit">
                                <span class="mini">Quit</span>
                                </button>

                            </div>
                        </div>
                    </div>

                    <!-- Music -->
                    <audio id="bgMusic" loop>
                        <source src="sounds/savour.ogg" type="audio/ogg">
                    </audio>
                    
                </div>

                <!-- Right Cool Images -->
                <div id="rightCoolImages" class="coolimage-column-right">

                </div>
           
            </div>
            <br>
            <br>
        </div>
        <!-- Page-Specific Imports and Settings -->
        <script src="code/big_script15.js"></script>
    </body>
</html>
