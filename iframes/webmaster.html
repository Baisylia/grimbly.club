<!DOCTYPE html>
<html>
    <!-- Imports and Settings -->
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device.width, initial-scale=1">
        <link rel="stylesheet" href="../code/mini_page_styles.css">
        <audio id="button-sound" src="../sounds/button_sound_heavy.mp3"></audio>
        <title>
            grimbly.club
        </title>
        
        <!-- Page-Specific Imports and Settings -->
        <script src="../code/mini_page_script.js"></script>
    </head>

    <body>
        <div class="background">
            <div class="border">

                <!-- Title -->
                <div class="flexy">
                    <img src="../images/delilah.gif" class="little-pic">
                    <h2 class="title">
                        Welcome to grimbly.club!
                    </h2>
                    <img src="../images/delilah.gif" class="little-pic">
                </div>

                <!-- Flags -->
                <div class="flag-row">
                    <img src="../images/flags/pride.gif">
                    <img src="../images/flags/transgender.gif">
                    <img src="../images/flags/lesbian.gif">
                    <img src="../images/flags/transfem.gif">
                    <img src="../images/flags/demisexual.gif">
                    <img src="../images/flags/catgender.gif">
                    <img src="../images/flags/autism.gif">
                </div>

                <!-- Text -->
                <div class="flexy">
                    <p class="text">
                        <br> <br>
                        I am the webmaster Baisylia (or Bailey), and I welcome you to grimbly.club. <br> <br>
                        This is where I reside on the web, thank you for stopping by! <br> <br>
                    </p>
                    <p class="note">
                        <br>
                        (It is not recommended to use this site on mobile devices.) <br> <br> <br> <br>
                    </p>
                </div>

                <!-- Pins Row -->
                <div class="button-row">
                    <button class="button-icon">
                        <img src="../images/buttons/pins.png" alt="Pins">
                        <span class="text">Pins</span>
                    </button>
                    
                    <button class="button-icon" onmousedown="soundPress()" onclick="navigate('blogs/main.html')">
                        <img src="../images/buttons/blog.png" alt="MainBlog">
                        <span class="text">Main Blog</span>
                    </button>
                    
                    <button class="button-icon" onmousedown="soundPress()" onclick="navigate('games/grimbly-garden.html')">
                        <img src="../images/buttons/games.png" alt="GrimblyGarden">
                        <span class="text">Grimbly Garden</span>
                    </button>

                    <button class="button-icon" onmousedown="soundPress()" onclick="navigate('games/last-card.html')">
                        <img src="../images/buttons/games.png" alt="LastCard">
                        <span class="text">Last Card</span>
                    </button>

                    <button class="button-icon" onmousedown="soundPress()" onclick="navigate('mods/raspberry-flavoured.html')">
                        <img src="../images/buttons/mods.png" alt="RaspberryFlavoured">
                        <span class="text">Raspberry Flavoured</span>
                    </button>

                    <button class="button-icon" onmousedown="soundPress()" onclick="navigate('changelogs.html')">
                        <img src="../images/buttons/changelogs.png" alt="Changelogs">
                        <span class="text">Changelogs</span>
                    </button>
                </div>

            </div>
        </div>
    </body>
</html>
